name: Docker CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  docker-build-test:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t invoice-backend-api:test .

      # 4. Run container
      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name api-test invoice-backend-api:test

      # 5. Wait for startup
      - name: Wait for API startup
        run: sleep 8

      # 6. Health check (your endpoint)
      - name: Test /health endpoint
        run: |
          curl --fail http://localhost:8000/health

      # 7. Cleanup
      - name: Stop container
        if: always()
        run: |
          docker stop api-test || true
          docker rm api-test || true